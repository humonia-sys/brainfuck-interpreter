name: CI & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Package Binaries (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cp build/brainfuck_interpreter .
        tar -czvf brainfuck-interpreter-${{ matrix.os }}.tar.gz brainfuck_interpreter

    - name: Package Binaries (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        copy build\Release\brainfuck_interpreter.exe .
        Compress-Archive -Path brainfuck_interpreter.exe -DestinationPath brainfuck-interpreter-windows-latest.zip

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: brainfuck-interpreter-${{ matrix.os }}
        path: |
          brainfuck-interpreter-*.tar.gz
          brainfuck-interpreter-*.zip

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Display downloaded artifacts
      run: ls -la artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/brainfuck-interpreter-*.tar.gz
          artifacts/brainfuck-interpreter-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
